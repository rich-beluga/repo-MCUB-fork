[package]
name        = studio
version     = 1.2.0
author      = @hairpin00
description = Interactive TUI module manager (vim-style)

[dependencies]
# Python pip packages (comma or newline separated)
pip    = aiohttp

# System programs (checked with which, non-fatal if missing)
system =

[install]
# .bin file placed into console/bin/<name>.py
# Leave empty if the package has no shell command
bin    = studio.bin
entry  =

# Explicit list of src/ files to download
# If omitted, manifest.ini is used
files  = __init__.py, tui.py, editor.py, actions.py, widgets.py
